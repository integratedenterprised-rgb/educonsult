apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aeroabroad
  namespace: aeroabroad
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/server-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_clear_headers "Server";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - aeroabroad.147181.com
        # When aeroabroad.com.np is registered + DNS-pointed, append it here
        # and re-apply; cert-manager will issue a SAN cert covering both.
        # - aeroabroad.com.np
        # - www.aeroabroad.com.np
      secretName: aeroabroad-tls
  rules:
    - host: aeroabroad.147181.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aeroabroad-app
                port:
                  number: 80
    # When aeroabroad.com.np is live, mirror these path blocks under the new host
    # and re-apply. Until then, the temp subdomain is the canonical URL.
