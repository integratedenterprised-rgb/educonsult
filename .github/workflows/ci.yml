name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Peer-dep tree currently requires legacy resolution — see README.
      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      # Schema validation is fast and catches malformed Prisma changes
      # before the typecheck pulls a stale generated client.
      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint --if-present
